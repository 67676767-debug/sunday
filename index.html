<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Amir</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.30.1/min/vs/editor/editor.main.css">
    <style>
        #editor {
            width: 800px;
            height: 600px;
            border: 1px solid #ccc;
        }
        #output {
            border: 1px solid #ccc;
            height: 200px;
            overflow: auto;
            white-space: pre;
        }
    </style>
</head>
<body>
    <h1>Amir</h1>
    <div id="editor"></div>
    <button id="runButton">Run Code</button>
    <div id="output"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.30.1/min/vs/loader.js"></script>
    <script>
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.30.1/min/vs' }});
        require(['vs/editor/editor.main'], function() {
            var editor = monaco.editor.create(document.getElementById('editor'), {
                value: '',
                language: 'lua'
            });

            document.getElementById('runButton').onclick = function() {
                var code = editor.getValue();
                // Simulate running Lua code and displaying output (Here you'd integrate your Lua execution logic)
                document.getElementById('output').innerText = 'Running code...
' + code;
            };
        });
    </script>
</body>
</html>
