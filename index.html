<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Luau Playground</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.30.1/min/monaco.min.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #141414; color: #ffffff; }
        #editor { height: calc(100vh - 50px); }
        .button { background-color: #007acc; color: white; border: none; padding: 10px 15px; cursor: pointer; }
        .button:hover { background-color: #005f99; }
    </style>
</head>
<body>
    <div id="editor"></div>
    <button class="button" onclick="runCode()">Run</button>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.30.1/min/monaco.min.js"></script>
    <script>
        monaco.editor.create(document.getElementById('editor'), {
            value: '-- Write your Luau code here...\nprint(\"Hello, Luau!\")\n',
            language: 'lua',
            theme: 'vs-dark',
            automaticLayout: true
        });

        function runCode() {
            const code = monaco.editor.getModel(monaco.editor.getModels()[0].uri).getValue();
            console.log(code); // Here, you can add logic to execute the code.
            alert('Code executed! Check the console.');
        }
    </script>
</body>
</html>
