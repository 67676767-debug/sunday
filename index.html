<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced Luau Playground</title>

  <!-- Monaco Editor CDN -->
  <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 15px;
    }

    #editor {
      width: 90%;
      height: 400px;
      border-radius: 10px;
      overflow: hidden;
    }

    button {
      margin: 10px;
      padding: 10px 20px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    #output {
      width: 90%;
      min-height: 120px;
      background: #020617;
      border-radius: 10px;
      padding: 10px;
      color: #22c55e;
      font-family: monospace;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>Roblox Luau Playground</h1>

  <div id="editor"></div>

  <button onclick="runCode()">Run Code</button>

  <div id="output">Output / Errors will appear here...</div>

  <script>
    let editor;

    require.config({ paths: { vs: 'https://unpkg.com/monaco-editor@0.45.0/min/vs' }});
    require(['vs/editor/editor.main'], function () {
      editor = monaco.editor.create(document.getElementById('editor'), {
        value: 'print("Hello Roblox")\n\nlocal Players = game:GetService("Players")',
        language: 'lua',
        theme: 'vs-dark',
        automaticLayout: true
      });

      // Basic Roblox autocomplete
      monaco.languages.registerCompletionItemProvider('lua', {
        provideCompletionItems: () => {
          return {
            suggestions: [
              {
                label: 'game:GetService',
                kind: monaco.languages.CompletionItemKind.Function,
                insertText: 'game:GetService("${1:Service}")',
                insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet
              },
              {
                label: 'Players',
                kind: monaco.languages.CompletionItemKind.Variable,
                insertText: 'game:GetService("Players")'
              },
              {
                label: 'LocalPlayer',
                kind: monaco.languages.CompletionItemKind.Variable,
                insertText: 'game.Players.LocalPlayer'
              },
              {
                label: 'print',
                kind: monaco.languages.CompletionItemKind.Function,
                insertText: 'print(${1})',
                insertTextRules: monaco.languages.CompletionItemInsertTextRule.InsertAsSnippet
              }
            ]
          };
        }
      });
    });

    function runCode() {
      const output = document.getElementById("output");
      const code = editor.getValue();

      try {
        let logs = [];
        const print = (...args) => logs.push(args.join(" "));

        // Simulated environment (NOT real Roblox)
        const game = {
          GetService: (name) => ({ Name: name })
        };

        eval(code);

        output.innerText = logs.join("\n") || "(no output)";
      } catch (err) {
        output.innerText = "Error: " + err.message;
      }
    }
  </script>
</body>
</html>
